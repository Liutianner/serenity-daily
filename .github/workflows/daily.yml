name: Serenity Daily Digest

on:
  schedule:
    # 每天北京时间 09:00 运行 (UTC 01:00)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch posts from Nitter
        run: python fetch_posts.py
        continue-on-error: true  # Nitter 可能不可用，继续执行

      - name: Generate report
        run: python format_report.py

      - name: Push to DingTalk
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: python push_dingtalk.py

      - name: Save report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: serenity-report
          path: report.md
          retention-days: 7
